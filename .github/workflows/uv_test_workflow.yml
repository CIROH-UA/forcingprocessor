      #   run: |
      #     python -m pytest -q --tb=short --disable-warnings --maxfail=1 -k test_csv_output_type
      #     python -m pytest -q --tb=short --disable-warnings --maxfail=1 -k test_parquet_output_type
      #     python -m pytest -q --tb=short --disable-warnings --maxfail=1 -k test_s3_output
      #     python -m pytest -q --tb=short --disable-warnings --maxfail=1 -k test_tar_output_type
